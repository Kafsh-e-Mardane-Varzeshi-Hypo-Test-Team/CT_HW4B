version: '3.8'

x-kafka-common: &kafka-common
  image: bitnami/kafka:latest
  networks:
    - kafka-network
  mem_limit: 768m
  cpus: 0.5

x-cockroach-common: &cockroach-common
  image: cockroachdb/cockroach:latest
  mem_limit: 768m
  cpus: 0.5
  networks:
    - cockroach-network

x-cassandra-common: &cassandra-common
  image: cassandra:latest
  mem_reservation: 1g
  mem_limit: 2g
  networks:
    - cassandra-network

services:
  kafka-1:
    <<: *kafka-common
    container_name: kafka-1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data-1:/bitnami/kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_KRAFT_CLUSTER_ID=kraft-cluster
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-1:29092,EXTERNAL://localhost:9092

  kafka-2:
    <<: *kafka-common
    container_name: kafka-2
    ports:
      - "9093:9092"
    volumes:
      - kafka-data-2:/bitnami/kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_KRAFT_CLUSTER_ID=kraft-cluster
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_CFG_NODE_ID=2
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-2:29092,EXTERNAL://localhost:9093

  kafka-3:
    <<: *kafka-common
    container_name: kafka-3
    ports:
      - "9094:9092"
    volumes:
      - kafka-data-3:/bitnami/kafka
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_KRAFT_CLUSTER_ID=kraft-cluster
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_CFG_NODE_ID=3
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka-3:29092,EXTERNAL://localhost:9094

  cockroach-1:
    <<: *cockroach-common
    container_name: cockroach-1
    command: start --insecure --advertise-addr=cockroach-1 --join=cockroach-1,cockroach-2,cockroach-3
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data-1:/cockroach/cockroach-data

  cockroach-2:
    <<: *cockroach-common
    container_name: cockroach-2
    command: start --insecure --advertise-addr=cockroach-2 --join=cockroach-1,cockroach-2,cockroach-3
    ports:
      - "26258:26257"
      - "8081:8080"
    volumes:
      - cockroach-data-2:/cockroach/cockroach-data

  cockroach-3:
    <<: *cockroach-common
    container_name: cockroach-3
    command: start --insecure --advertise-addr=cockroach-3 --join=cockroach-1,cockroach-2,cockroach-3
    ports:
      - "26259:26257"
      - "8082:8080"
    volumes:
      - cockroach-data-3:/cockroach/cockroach-data

  cockroach-init:
    <<: *cockroach-common
    container_name: cockroach-init
    command: init --insecure --host=cockroach-1
    depends_on:
      - cockroach-1
      - cockroach-2
      - cockroach-3
    restart: "no"
    
  cassandra-1:
    <<: *cassandra-common
    container_name: cassandra-1
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data-1:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=my_cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_USER=cassandra
      - CASSANDRA_PASSWORD=cassandra
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_LISTEN_ADDRESS=cassandra-1
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-1
      - CASSANDRA_RPC_ADDRESS=cassandra-1
      - CASSANDRA_BROADCAST_RPC_ADDRESS=cassandra-1

  cassandra-2:
    <<: *cassandra-common
    container_name: cassandra-2
    ports:
      - "9043:9042"
    volumes:
      - cassandra-data-2:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=my_cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_USER=cassandra
      - CASSANDRA_PASSWORD=cassandra
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_LISTEN_ADDRESS=cassandra-2
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-2
      - CASSANDRA_RPC_ADDRESS=cassandra-2
      - CASSANDRA_BROADCAST_RPC_ADDRESS=cassandra-2

  cassandra-3:
    <<: *cassandra-common
    container_name: cassandra-3
    ports:
      - "9044:9042"
    volumes:
      - cassandra-data-3:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=my_cluster
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_SEEDS=cassandra-1,cassandra-2,cassandra-3
      - CASSANDRA_USER=cassandra
      - CASSANDRA_PASSWORD=cassandra
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=128M
      - CASSANDRA_LISTEN_ADDRESS=cassandra-3
      - CASSANDRA_BROADCAST_ADDRESS=cassandra-3
      - CASSANDRA_RPC_ADDRESS=cassandra-3
      - CASSANDRA_BROADCAST_RPC_ADDRESS=cassandra-3

  cassandra-init:
    image: cassandra:latest
    container_name: cassandra-init
    depends_on:
      - cassandra-1
      - cassandra-2
      - cassandra-3
    volumes:
      - ./db/cassandra/init.cql:/init.cql
    command: >
      /bin/bash -c '
      until cqlsh cassandra-1 -e "describe cluster"; do
        echo "Waiting for Cassandra cluster to be ready...";
        sleep 5;
      done;
      echo "Cassandra cluster is ready. Loading keyspace...";
      cqlsh cassandra-1 -f /init.cql
      '
    mem_limit: 256m
    cpus: 0.25
    networks:
      - cassandra-network

  clickhouse-server:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-server
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./db/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_DB=logs
      - CLICKHOUSE_USER=clickhouse_user
      - CLICKHOUSE_PASSWORD=clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    mem_limit: 768m
    cpus: 0.5

networks:
  cockroach-network:
    driver: bridge
  cassandra-network:
    driver: bridge
  kafka-network:
    driver: bridge

volumes:
  kafka-data-1:
  kafka-data-2:
  kafka-data-3:
  
  cockroach-data-1:
  cockroach-data-2:
  cockroach-data-3:
  
  cassandra-data-1:
  cassandra-data-2:
  cassandra-data-3:
  
  clickhouse-data:
  