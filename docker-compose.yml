x-kafka-common: &kafka-common
  image: bitnami/kafka:latest
  networks:
    - kafka-network
  environment: &kafka-env
    KAFKA_ENABLE_KRAFT: "yes"
    KAFKA_CFG_PROCESS_ROLES: controller,broker
    KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
    KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_CFG_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
    KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
    KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_KRAFT_CLUSTER_ID: kraft-cluster
    KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 768M
  restart: unless-stopped

x-cockroach-common: &cockroach-common
  image: cockroachdb/cockroach:latest
  command: start --insecure --join=cockroachdb-1,cockroachdb-2,cockroachdb-3
  networks:
    - cockroach-network
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 768M
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "cockroach", "node", "status", "--insecure", "--host=localhost"]
    interval: 10s
    timeout: 5s
    retries: 5

x-cassandra-common: &cassandra-common
  image: cassandra:latest
  environment: &cassandra-env
    CASSANDRA_CLUSTER_NAME: my_cluster
    CASSANDRA_DC: datacenter1
    CASSANDRA_RACK: rack1
    CASSANDRA_SEEDS: cassandra-1,cassandra-2,cassandra-3
    CASSANDRA_USER: cassandra_user
    CASSANDRA_PASSWORD: cassandra_password
    MAX_HEAP_SIZE: 768M
    HEAP_NEWSIZE: 128M
  mem_reservation: 1g
  mem_limit: 2g
  networks:
    - cassandra-network
  healthcheck:
    test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 30s

services:
  kafka1:
    <<: *kafka-common
    container_name: kafka1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092

  kafka2:
    <<: *kafka-common
    container_name: kafka2
    ports:
      - "9093:9092"
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID: "2"
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka2:29092,EXTERNAL://localhost:9093

  kafka3:
    <<: *kafka-common
    container_name: kafka3
    ports:
      - "9094:9092"
    environment:
      <<: *kafka-env
      KAFKA_CFG_NODE_ID: "3"
      KAFKA_CFG_ADVERTISED_LISTENERS: INTERNAL://kafka3:29092,EXTERNAL://localhost:9094


  cockroachdb-1:
    <<: *cockroach-common
    container_name: cockroachdb-1
    command: start --insecure --advertise-addr=cockroachdb-1 --join=cockroachdb-1,cockroachdb-2,cockroachdb-3
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data-1:/cockroach/cockroach-data

  cockroachdb-2:
    <<: *cockroach-common
    container_name: cockroachdb-2
    command: start --insecure --advertise-addr=cockroachdb-2 --join=cockroachdb-1,cockroachdb-2,cockroachdb-3
    ports:
      - "26258:26257"
      - "8081:8080"
    volumes:
      - cockroach-data-2:/cockroach/cockroach-data

  cockroachdb-3:
    <<: *cockroach-common
    container_name: cockroachdb-3
    command: start --insecure --advertise-addr=cockroachdb-3 --join=cockroachdb-1,cockroachdb-2,cockroachdb-3
    ports:
      - "26259:26257"
      - "8082:8080"
    volumes:
      - cockroach-data-3:/cockroach/cockroach-data


  cockroachdb-init:
    image: cockroachdb/cockroach:latest
    container_name: cockroachdb-init
    command: init --insecure --host=cockroachdb-1
    depends_on:
      - cockroachdb-1
      - cockroachdb-2
      - cockroachdb-3
    networks:
      - cockroach-network
    restart: "no"
    
  cassandra-1:
    <<: *cassandra-common
    container_name: cassandra-1
    hostname: cassandra-1
    environment:
      <<: *cassandra-env
      CASSANDRA_LISTEN_ADDRESS: cassandra-1
      CASSANDRA_BROADCAST_ADDRESS: cassandra-1
      CASSANDRA_RPC_ADDRESS: cassandra-1
      CASSANDRA_BROADCAST_RPC_ADDRESS: cassandra-1
    ports:
      - "9042:9042"
    volumes:
      - cassandra-1-data:/var/lib/cassandra

  cassandra-2:
    <<: *cassandra-common
    container_name: cassandra-2
    hostname: cassandra-2
    environment:
      <<: *cassandra-env
      CASSANDRA_LISTEN_ADDRESS: cassandra-2
      CASSANDRA_BROADCAST_ADDRESS: cassandra-2
      CASSANDRA_RPC_ADDRESS: cassandra-2
      CASSANDRA_BROADCAST_RPC_ADDRESS: cassandra-2
    ports:
      - "9043:9042"
    volumes:
      - cassandra-2-data:/var/lib/cassandra

  cassandra-3:
    <<: *cassandra-common
    container_name: cassandra-3
    hostname: cassandra-3
    environment:
      <<: *cassandra-env
      CASSANDRA_LISTEN_ADDRESS: cassandra-3
      CASSANDRA_BROADCAST_ADDRESS: cassandra-3
      CASSANDRA_RPC_ADDRESS: cassandra-3
      CASSANDRA_BROADCAST_RPC_ADDRESS: cassandra-3
    ports:
      - "9044:9042"
    volumes:
      - cassandra-3-data:/var/lib/cassandra


  cassandra-load-keyspace:
    image: cassandra:latest
    container_name: cassandra-load-keyspace
    depends_on:
      - cassandra-1
      - cassandra-2
      - cassandra-3
    volumes:
      - ./db/cassandra/init.cql:/init.cql
    command: >
      /bin/bash -c '
      until cqlsh cassandra-1 -e "describe cluster"; do
        echo "Waiting for Cassandra cluster to be ready...";
        sleep 5;
      done;
      echo "Cassandra cluster is ready. Loading keyspace...";
      cqlsh cassandra-1 -f /init.cql
      '
    mem_limit: 256m
    cpus: 0.25
    networks:
      - cassandra-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse 
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./db/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - CLICKHOUSE_DB=logs
      - CLICKHOUSE_USER=clickhouse_user
      - CLICKHOUSE_PASSWORD=clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    mem_limit: 768m
    cpus: 0.5

networks:
  cockroach-network:
    driver: bridge
  cassandra-network:
    driver: bridge
  kafka-network:
    driver: bridge

volumes:
  cockroach-data-1:
  cockroach-data-2:
  cockroach-data-3:
  cassandra-1-data:
  cassandra-2-data:
  cassandra-3-data: