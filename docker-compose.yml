services:
  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    mem_limit: 512m
    cpus: 0.5
  
  cockroachdb:
    image: cockroachdb/cockroach:latest
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8080:8080"
    mem_limit: 512m
    cpus: 0.5
    
  cassandra:
    image: cassandra:latest
    environment:
      - CASSANDRA_USER=cassandra_user
      - CASSANDRA_PASSWORD=cassandra_password
      - MAX_HEAP_SIZE=768M
      - HEAP_NEWSIZE=128M
    mem_reservation: 1g      # soft limit — JVM target usage
    mem_limit: 2g              # hard ceiling — enforceable
    ports:
      - "9042:9042"

  cassandra-load-keyspace:
    image: cassandra:latest
    depends_on:
      - cassandra
    volumes:
      - ./db/cassandra/init.cql:/init.cql
    command: >
      /bin/bash -c '
      until cqlsh cassandra -e "describe cluster"; do
        echo "Waiting for Cassandra to be ready...";
        sleep 2;
      done;
      echo "Cassandra is ready. Loading keyspace...";
      cqlsh cassandra -f /init.cql
      '
    mem_limit: 256m
    cpus: 0.25

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./db/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - CLICKHOUSE_DB=logs
      - CLICKHOUSE_USER=clickhouse_user
      - CLICKHOUSE_PASSWORD=clickhouse_password
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    mem_limit: 512m
    cpus: 0.5
